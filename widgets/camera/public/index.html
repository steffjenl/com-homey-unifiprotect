<html>
<head>
    <style>
        :root {
            --homey-su: 0px;
        }
        .camera {
            width: 100%;
            height: 100%;
            position: absolute;

        }
        .loading {
            width: 100%;
            height: 100%;
            position: absolute;
        }
    </style>
</head>

<body class="homey-widget">
<img id="camera" src="loading.png" alt="Camera" class="loading"/>

<script type="text/javascript">
    function onHomeyReady(Homey) {
        Homey.ready();

        const settings = Homey.getSettings();
        const interval = Math.max(1, settings.refreshInterval || 2) * 1000;

        function poll() {
            if (!settings.device?.id) {
                setTimeout(poll, interval);
                return;
            }
            const start = Date.now();
            const live = settings.enableLiveSnapshot !== false;
            Homey.api('GET', '/snapshot?deviceId=' + settings.device.id + '&live=' + live)
                .then((dataUrl) => {
                    const img = document.getElementById('camera');
                    img.src = dataUrl;
                    img.className = 'camera';
                })
                .catch(console.error)
                .finally(() => setTimeout(poll, Math.max(0, interval - (Date.now() - start))));
        }

        setTimeout(poll, 500);
    }
</script>
</body>
</html>
