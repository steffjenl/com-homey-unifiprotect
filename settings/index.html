<!doctype html>
<html>

<head>
    <script type="text/javascript" src="/manager/webserver/assets/js/jquery.js"></script>
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
</head>

<body>
<!-- Instruction -->
<p data-i18n="settings.instruction"></p>
<!-- NVR -->
<fieldset class="homey-form-fieldset">
    <legend class="homey-form-legend" data-i18n="settings.nvr"></legend>

    <!-- IP address -->
    <div class="field row">
        <label class="homey-form-label" for="txt_nvrip" data-i18n="settings.nvrip"></label>
        <input class="homey-form-input" id="txt_nvrip" type="text" value=""/>
    </div>

    <!-- Port -->
    <div class="field row">
        <label class="homey-form-label" for="txt_nvrport" data-i18n="settings.nvrport"></label>
        <input class="homey-form-input" id="txt_nvrport" type="text" value="443"/>
    </div>

</fieldset>

<!-- Credentials -->
<fieldset class="homey-form-fieldset">
    <legend class="homey-form-legend" data-i18n="settings.credentials"></legend>

    <!-- Username -->
    <div class="field row">
        <label class="homey-form-label" for="txt_username" data-i18n="settings.username"></label>
        <input class="homey-form-input" id="txt_username" type="text" value=""/>
    </div>

    <!-- Password -->
    <div class="field row">
        <label class="homey-form-label" for="txt_password" data-i18n="settings.password"></label>
        <input class="homey-form-input" id="txt_password" type="password" value=""/>
    </div>

    <!-- API-Key -->
    <div class="field row">
        <label class="homey-form-label" for="txt_protectV2ApiKey" data-i18n="settings.protectV2ApiKey"></label>
        <input class="homey-form-input" id="txt_protectV2ApiKey" type="text" value=""/>
    </div>
</fieldset>

<!-- Access API Credentials -->
<fieldset class="homey-form-fieldset">
    <legend class="homey-form-legend" data-i18n="settings.accessCredentials"></legend>
        <!-- API-Key -->
    <div class="field row">
        <label class="homey-form-label" for="txt_accessApiKey" data-i18n="settings.accessApiKey"></label>
        <input class="homey-form-input" id="txt_accessApiKey" type="text" value=""/>
    </div>
</fieldset>

<!-- Settings -->
<fieldset class="homey-form-fieldset">
    <legend class="homey-form-legend" data-i18n="settings.settings"></legend>

    <!-- useCameraSnapshot -->
    <div class="field row">
        <label class="homey-form-checkbox">
            <input class="homey-form-checkbox-input" id="txt_useCameraSnapshot" type="checkbox" value="true">
            <span class="homey-form-checkbox-checkmark"></span>
            <span class="homey-form-checkbox-text"><span data-i18n="settings.useCameraSnapshot"></span></span>
        </label>
    </div>

    <!-- ignoreEventsNfcFingerprint -->
    <div class="field row">
        <label class="homey-form-label" for="txt_ignoreEventsNfcFingerprint" data-i18n="settings.ignoreEventsNfcFingerprint"></label>
        <input class="homey-form-input" id="txt_ignoreEventsNfcFingerprint" type="number" value="5"/>
    </div>

    <!-- ignoreEventsDoorbell -->
    <div class="field row">
        <label class="homey-form-label" for="txt_ignoreEventsDoorbell" data-i18n="settings.ignoreEventsDoorbell"></label>
        <input class="homey-form-input" id="txt_ignoreEventsDoorbell" type="number" value="5"/>
    </div>

</fieldset>

<!-- Apply button -->
<div class="field row">
    <button id="btn_test" class="homey-button-primary-full" data-i18n="settings.testConnection"></button>
    <br/>
    <button id="btn_apply" class="homey-button-primary-full" data-i18n="settings.apply"></button>
</div>

<hr/>
<!-- Title -->
<legend class="homey-form-legend" data-i18n="settings.status"></legend>

<p><span data-i18n="settings.status">Status</span>: <span id="unifi_status" style="font-weight: bold;">Unknown</span>
</p>
<p><span data-i18n="settings.websocket.status">Protect V1 Realtime Status</span>: <span id="unifi_websocket_status"
                                                                                     style="font-weight: bold;">Unknown</span>
</p>
<p><span data-i18n="settings.websocket.at">Protect V1 Last update at</span>: <span id="unifi_websocket_at"
                                                                                style="font-weight: bold;">Unknown</span>
</p>
<p><span data-i18n="settings.protectV2Websocket.status">Protect V2 Realtime Status</span>: <span id="unifi_protectV2_websocket_status"
                                                                                                 style="font-weight: bold;">Unknown</span>
</p>
<p><span data-i18n="settings.protectV2Websocket.at">Protect V2 Last update at</span>: <span id="unifi_protectV2_websocket_at"
                                                                                            style="font-weight: bold;">Unknown</span>
</p>
<p><span data-i18n="settings.accessWebsocket.status">Access Realtime Status</span>: <span id="unifi_access_websocket_status"
                                                                                          style="font-weight: bold;">Unknown</span>
</p>
<p><span data-i18n="settings.accessWebsocket.at">Access Last update at</span>: <span id="unifi_access_websocket_at"
                                                                                     style="font-weight: bold;">Unknown</span>
</p>

<script type="text/javascript">
    const txtNvrIp = document.getElementById('txt_nvrip');
    const txtNvrPort = document.getElementById('txt_nvrport');
    const txtUsername = document.getElementById('txt_username');
    const txtPassword = document.getElementById('txt_password');
    const txtAccessApiKey = document.getElementById('txt_accessApiKey');
    const txtProtectV2ApiKey = document.getElementById('txt_protectV2ApiKey');
    const txtuseCameraSnapshot = document.getElementById('txt_useCameraSnapshot');
    const txtIgnoreEventsNfcFingerprint = document.getElementById('txt_ignoreEventsNfcFingerprint');
    const txtIgnoreEventsDoorbell = document.getElementById('txt_ignoreEventsDoorbell');
    const btnApply = document.getElementById('btn_apply');
    const btnTest = document.getElementById('btn_test');

    function onHomeyReady(Homey) {
        const readSettings = () => {
            Homey.get('ufp:nvrip', (error, nvrip) => {
                if (error) return Homey.alert(error);

                if (nvrip) {
                    txtNvrIp.value = nvrip;
                } else {
                    console.warn('[SETTINGS] Could not read UniFi Cloud Key IP address.');
                }
            });

            Homey.get('ufp:nvrport', (error, nvrPort) => {
                if (error) return Homey.alert(error);

                if (nvrPort) {
                    txtNvrPort.value = nvrPort;
                } else {
                    console.warn('[SETTINGS] Could not read UniFi Cloud Key Port.');
                }
            });

            Homey.get('ufp:credentials', (error, credentials) => {
                if (error) return Homey.alert(error);

                if (credentials) {
                    txtUsername.value = credentials.username;
                    txtPassword.value = credentials.password;
                } else {
                    console.warn('[SETTINGS] Could not read credentials.');
                }
            });

            Homey.get('ufp:tokens', (error, credentials) => {
                if (error) return Homey.alert(error);

                if (credentials) {
                    txtAccessApiKey.value = credentials.accessApiKey ? credentials.accessApiKey : '';
                    txtProtectV2ApiKey.value = credentials.protectV2ApiKey ? credentials.protectV2ApiKey : '';
                } else {
                    console.warn('[SETTINGS] Could not read tokens credentials.');
                }
            });

            Homey.get('ufp:settings', (error, settings) => {
                if (error) return Homey.alert(error);
                if (settings) {
                    txtuseCameraSnapshot.checked = settings.useCameraSnapshot;
                    txtIgnoreEventsNfcFingerprint.value = settings.ignoreEventsNfcFingerprint || 5;
                    txtIgnoreEventsDoorbell.value = settings.ignoreEventsDoorbell || 5;
                } else {
                    console.warn('[SETTINGS] Could not read settings.');
                }
            });
        };

        const saveSettings = () => {
            Homey.set('ufp:nvrip', txtNvrIp.value, (error, result) => {
                if (error) return Homey.alert(error);
                console.log('[SETTINGS] UniFi Cloud Key IP address saved.');
            });

            Homey.set('ufp:nvrport', txtNvrPort.value, (error, result) => {
                if (error) return Homey.alert(error);
                console.log('[SETTINGS] UniFi Cloud Key Port saved.');
            });

            const credentials = {
                'username': txtUsername.value,
                'password': txtPassword.value
            };

            Homey.set('ufp:credentials', credentials, (error, result) => {
                if (error) return Homey.alert(error);
                console.log('[SETTINGS] credentials saved.');
            });

            const apiTokens = {
                'accessApiKey': txtAccessApiKey.value,
                'protectV2ApiKey': txtProtectV2ApiKey.value
            };

            Homey.set('ufp:tokens', apiTokens, (error, result) => {
                if (error) return Homey.alert(error);
                console.log('[SETTINGS] tokens saved.');
            });

            const settings = {
                'useCameraSnapshot': (!!txtuseCameraSnapshot.checked),
                'ignoreEventsNfcFingerprint': parseInt(txtIgnoreEventsNfcFingerprint.value) || 5,
                'ignoreEventsDoorbell': parseInt(txtIgnoreEventsDoorbell.value) || 5
            };

            Homey.set('ufp:settings', settings, (error, result) => {
                if (error) return Homey.alert(error);
                console.log('[SETTINGS] settings saved.');
            });

            Homey.alert(Homey.__('settings.saved'), 'info');
        };

        const testSettings = () => {
            const settings = {
                'host': txtNvrIp.value,
                'port': txtNvrPort.value,
                'user': txtUsername.value,
                'pass': txtPassword.value,
                'accessApiKey': txtAccessApiKey.value,
                'protectV2ApiKey': txtProtectV2ApiKey.value
            };

            Homey.api("POST", "/test", settings, function (err, response) {
                if (err) return Homey.alert(err);
                if (response) {
                    if (response.status === 'success') {
                        Homey.alert(Homey.__('settings.test_status.success'), 'info');
                    } else {
                        Homey.alert(Homey.__('settings.test_status.failure'), 'error');
                    }
                }
            });
        };

        btnTest.addEventListener('click', e => {
            testSettings();
        });

        btnApply.addEventListener('click', e => {
            if (txtuseCameraSnapshot.checked) {
                Homey.confirm(Homey.__('settings.useCameraSnapshotInstruction'), 'info', (err, confirmed) => {
                    if (err) return Homey.alert(err);
                    if (confirmed) {
                        saveSettings();
                    }
                });
            } else {
                saveSettings();
            }
        });

        readSettings();

        Homey.ready();

        const updateStatusField = (err, data) => {
            if (err) {
                return err;
            }
            var color = 'darkred';
            if (data === 'Connected') color = 'darkgreen';
            if (data === 'Connecting...') color = 'orange';

            var statusField = document.getElementById('unifi_status');
            statusField.style.color = color;

            var translationKey = 'status.connection.' + data;
            var translation = Homey.__(translationKey);

            if (translation === translationKey || translation === '' || typeof translation === 'undefined') {
                statusField.innerHTML = data;
            } else {
                statusField.innerHTML = translation;
            }
        }

        const updateWebsocketStatusField = (err, data) => {
            if (err) {
                return err;
            }
            var color = 'darkred';
            if (data === 'Connected') color = 'darkgreen';
            if (data === 'Connecting...') color = 'orange';

            var statusField = document.getElementById('unifi_websocket_status');
            statusField.style.color = color;

            var translationKey = 'status.connection.' + data;
            var translation = Homey.__(translationKey);

            if (translation === translationKey || translation === '' || typeof translation === 'undefined') {
                statusField.innerHTML = data;
            } else {
                statusField.innerHTML = translation;
            }
        }

        const updateWebsocketAtField = (err, data) => {
            if (err) {
                return err;
            }

            document.getElementById('unifi_websocket_at').innerHTML = data;
        }

        const updateAccessWebsocketStatusField = (err, data) => {
            if (err) {
                return err;
            }
            var color = 'darkred';
            if (data === 'Connected') color = 'darkgreen';
            if (data === 'Connecting...') color = 'orange';

            var statusField = document.getElementById('unifi_access_websocket_status');
            statusField.style.color = color;

            var translationKey = 'status.connection.' + data;
            var translation = Homey.__(translationKey);

            if (translation === translationKey || translation === '' || typeof translation === 'undefined') {
                statusField.innerHTML = data;
            } else {
                statusField.innerHTML = translation;
            }
        }

        const updateAccessWebsocketAtField = (err, data) => {
            if (err) {
                return err;
            }

            document.getElementById('unifi_access_websocket_at').innerHTML = data;
        }

        const updateProtectV2WebsocketStatusField = (err, data) => {
            if (err) {
                return err;
            }
            var color = 'darkred';
            if (data === 'Connected') color = 'darkgreen';
            if (data === 'Connecting...') color = 'orange';

            var statusField = document.getElementById('unifi_protectV2_websocket_status');
            statusField.style.color = color;

            var translationKey = 'status.connection.' + data;
            var translation = Homey.__(translationKey);

            if (translation === translationKey || translation === '' || typeof translation === 'undefined') {
                statusField.innerHTML = data;
            } else {
                statusField.innerHTML = translation;
            }
        }

        const updateProtectV2WebsocketAtField = (err, data) => {
            if (err) {
                return err;
            }

            document.getElementById('unifi_protectV2_websocket_at').innerHTML = data;
        }

        Homey.on('com.ubnt.unifiprotect.status', (data) => {
            updateStatusField(null, data);
        });
        Homey.on('com.ubnt.unifiprotect.websocket.status', (data) => {
            updateWebsocketStatusField(null, data);
        });
        Homey.on('com.ubnt.unifiprotect.accessWebsocket.status', (data) => {
            updateAccessWebsocketStatusField(null, data);
        });
        Homey.on('com.ubnt.unifiprotect.protectV2Websocket.status', (data) => {
            updateProtectV2WebsocketStatusField(null, data);
        });
        Homey.get('com.ubnt.unifiprotect.status', updateStatusField);
        Homey.get('com.ubnt.unifiprotect.websocket.status', updateWebsocketStatusField);
        Homey.get('com.ubnt.unifiprotect.accessWebsocket.status', updateAccessWebsocketStatusField);

        Homey.api("GET", "/status", null, function (err, result) {
            updateStatusField(null, result);
            if (err) return Homey.alert(err);
        });

        Homey.api("GET", "/websocketstatus", null, function (err, result) {
            updateWebsocketStatusField(null, result);
            if (err) return Homey.alert(err);
        });

        Homey.api("GET", "/getLastWebsocketMessageTime", null, function (err, result) {
            updateWebsocketAtField(null, result);
            if (err) return Homey.alert(err);
        });

        Homey.api("GET", "/accesswebsocketstatus", null, function (err, result) {
            updateAccessWebsocketStatusField(null, result);
            if (err) return Homey.alert(err);
        });

        Homey.api("GET", "/getLastAccessWebsocketMessageTime", null, function (err, result) {
            updateAccessWebsocketAtField(null, result);
            if (err) return Homey.alert(err);
        });

        Homey.api("GET", "/protectv2websocketstatus", null, function (err, result) {
            updateProtectV2WebsocketStatusField(null, result);
            if (err) return Homey.alert(err);
        });

        Homey.api("GET", "/getLastProtectV2WebsocketMessageTime", null, function (err, result) {
            updateProtectV2WebsocketAtField(null, result);
            if (err) return Homey.alert(err);
        });
    }
</script>
</body>

</html>
